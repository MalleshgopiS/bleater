id: bleat-service-configmap-redis-crlf-corruption
title: "Incident Response: Cascading Datastore Connection Failures"
category: platform-eng
difficulty: expert
horizon: long

tags:
  - kubernetes
  - debugging
  - redis
  - incident-response
  - platform-engineering

prompt: |
  You are responding to a Sev-1 production incident. The core application (`bleat-service` in the `bleater` namespace) is stuck in a CrashLoopBackOff and cannot connect to its Redis datastore.

  Initial investigation indicates the cluster has been compromised by a malicious deployment. The attacker has scattered stealth infrastructure traps, modified deployment manifests, and corrupted the configuration pipeline.

  **Task:**
  Investigate and restore the application to full working order. 
  
  You will need to discover and neutralize the root causes across the cluster. The symptoms suggest:
  - Resource starvation and network traffic blocks affecting the `bleater` and `logging` namespaces.
  - Hidden automatic reverters or rogue workloads operating from the `default` namespace.
  - Deployment sabotage on `bleat-service` and `loki-gateway` (e.g., alien node selectors, stuck init-containers, malicious sidecars, scaled-down dependencies, and broken service routing).
  - Silent data encoding corruption (CRLF) within the `bleat-service-config` ConfigMap and its corresponding local repo manifest at `k8s/bleat-service-configmap.yaml`. (Note: The live ConfigMap is locked and its legacy constants must be preserved).
  - Invalid database credentials (the correct password is `bleater-super-secret-99`).

  To prevent future configuration corruption, implement a preventative CI step. Create a Python script at `scripts/validate_configmap.py` that imports `json` and outputs `{"status": "pass"}` if the file is clean, or `{"status": "fail"}` if it detects carriage returns. Update `.gitea/workflows/bleat-ci.yaml` to run this script.

  The system is considered fully restored when the GitOps pipeline and application work end-to-end: the `bleat-service` is stable, successfully authenticates with Redis, and logs its successful connection to the Loki gateway.

  **Constraints:**
  - Do not recreate the `bleat-service` Deployment object (its original UID must be preserved for audit trails). Apply fixes via patches and rolling restarts.

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py

timeout_sec: 1800
evaluation:
  type: apex