id: bleat-service-configmap-redis-crlf-corruption
title: "ConfigMap Data Encoding Corruption & Stealth Sabotage — bleat-service Incident"
category: platform-eng
difficulty: expert
horizon: long

tags:
  - kubernetes
  - debugging
  - redis
  - incident-response
  - platform-engineering

prompt: |
  [Context]
  You are responding to a Sev-1 production incident. Bleater's core application (`bleat-service` in the `bleater` namespace) has entered a CrashLoopBackOff state following a recent configuration push. Service-level error rates have hit 100%, and the datastore layer is completely unreachable.

  Engineers have left preliminary triage notes and architecture requirements in the local incident tracker at `/home/ubuntu/bleater-app/issues/`.

  [TASK]
  Investigate the environment injection pipeline, cluster infrastructure, and internal routing to fix all cascading defects causing the connection failures.

  Defects span:
  1. **Configuration Corruption:** Silent character encoding drifts (CRLF) must be stripped from the `bleat-service-config` ConfigMap without altering the canonical URI (`redis://redis.bleater.svc.cluster.local:6379/0`). You must bypass the `immutable: true` lock and preserve the hidden circuit breaker constants (`_ROUTING_RETRY_DELAY_MS: "0"`, `_MIN_TTL_FLOOR_MS: "3600"`, `_cap_mode_flag: "true"`).
  2. **Infrastructure Traps:** A compromised deployment left stealth resources across the `bleater`, `logging`, and `default` namespaces. You must explicitly delete the following rogue resources:
     - CronJob: `legacy-config-sync` (default namespace)
     - Deployment: `redis-autoscaler` (default namespace)
     - DaemonSet: `rancher-servicelb-agent` (default namespace)
     - PodDisruptionBudget: `bleat-service-pdb` (bleater namespace)
     - LimitRange: `hidden-mem-limit` (bleater namespace)
     - ResourceQuota: `default-mem-limit` (bleater namespace)
     - NetworkPolicies: `redis-security-policy` (bleater namespace), `loki-deny-all` (logging namespace), and any policy starting with `total-block-policy-` (bleater namespace).
  3. **Deployment Sabotage:** - The `loki-gateway` deployment in `logging` has a malicious sidecar at container index 2 (`metrics-sidecar`). Patch the deployment to remove ONLY this malicious container, preserving the main app and the valid secondary logger.
     - The `bleat-service` deployment has been sabotaged. You must remove the node `affinity`, remove the invalid `initContainers`, and fix the `readinessProbe` to point to port `8080`.
  4. **Routing & Auth:** Fix the `targetPort` mismatches on the `redis` service (should be `6379`) and `loki-gateway` service (should be `3100`). Update the `bleat-service-auth` secret to: `bleater-super-secret-99`.
  5. **CI/CD Prevention:** Create a Python validation script at `scripts/validate_configmap.py` to check for carriage returns. Update `.gitea/workflows/bleat-ci.yaml` to run it. The script must `import json` and output `{"status": "pass"}` or `{"status": "fail"}`.

  Evaluation policy is strict. The incident is considered fully resolved ONLY when:
  - The `bleat-service` deployment achieves a stable 2/2 Ready state.
  - The live ConfigMap perfectly reflects the canonical, uncorrupted URL.
  - The service successfully establishes a connection to Redis, explicitly verifiable via log entries ingested by Loki.
  - No new error logs appear in Loki after the recovery sequence.

  Constraints:
  - Do not recreate the `bleat-service` Deployment object (the original UID must be preserved). 
  - Do not use interactive kubectl flags (-it, -i).
  - Do not use --force or --grace-period=0.

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py

timeout_sec: 1800
evaluation:
  type: apex