id: bleat-service-configmap-redis-crlf-corruption
title: "bleat-service Sev-1 — full production outage"
category: platform-eng
difficulty: expert
horizon: long

tags:
  - kubernetes
  - debugging
  - incident-response
  - platform-engineering

prompt: |
  [Context]
  You are responding to a Sev-1 production incident. Bleater's core application
  (`bleat-service` in the `bleater` namespace) has entered a broken state.
  Service-level error rates are at 100% and the service is completely
  unreachable.

  Engineers have left preliminary triage notes in the local incident tracker at
  `/home/ubuntu/bleater-app/issues/`.

  [TASK]
  Investigate the entire environment and restore `bleat-service` to a fully
  operational state. The scope of the investigation is intentionally open-ended
  — examine whatever you believe is relevant.

  The incident is considered resolved when `bleat-service` is healthy,
  connected to its dependencies, and operating without errors end-to-end.

  Once the service is restored, also harden the system to prevent silent
  reintroduction of the same corruption — this includes fixing the
  source-of-truth manifests in the repository and adding CI safeguards so
  the same class of corruption is caught before it can reach the cluster again.

  Constraints:
  - Do **not** recreate the `bleat-service` Deployment (the original Kubernetes
    UID must be preserved for audit trails). Use rolling restarts only.
  - Do not change container image references.
  - Do not use interactive kubectl flags (`-it`, `-i`).
  - Do not modify `setup.sh` or the grader script.

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py

timeout_sec: 2700
evaluation:
  type: apex

metadata:
  category: platform-eng
  difficulty: expert
  estimated_time: 5H
  tags:
    - kubernetes
    - incident-response
    - platform-engineering
