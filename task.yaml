id: bleat-service-configmap-redis-crlf-corruption
title: Bleat Service Redis ConfigMap Corrupted by Carriage Returns
category: platform-eng
difficulty: hard
horizon: short

tags:
  - kubernetes
  - configmap
  - redis
  - loki
  - ci
  - platform-engineering

prompt: |
  [Context]
  A reduced copy of the bleat-service application is deployed in Kubernetes.

  The service reads REDIS_URL from a ConfigMap named:
    bleat-service-config

  A Windows-edited manifest introduced a hidden carriage return character
  (\r) into the REDIS_URL value. The corruption is not visible in normal
  terminal output but causes Redis connection failures at runtime.

  A Loki-compatible logging stack is available for log verification.

  Loki access:
    Service: loki-gateway
    Namespace: logging

  Repository files already checked out:
    k8s/bleat-service-configmap.yaml
    .gitea/workflows/bleat-ci.yaml

  Deployment details:
    Name: bleat-service
    Namespace: bleater
    Replicas: 2

  [Task]
  Repair the Redis configuration end-to-end.

  Required Actions:
  - Diagnose the hidden character corruption in the live ConfigMap.
  - Fix REDIS_URL so it exactly equals:
      redis://redis.bleater.svc.cluster.local:6379/0
  - Apply the corrected ConfigMap from the checked-out manifest.
  - Trigger a rolling restart of the bleat-service deployment.
  - Ensure all replicas become Running and Ready.
  - Verify Redis connectivity is restored.
  - Verify Loki logs confirm Redis recovery.

  Log Verification Requirements:
  - Loki logs must contain the success message:
      "redis connection established"
  - After recovery, no new Redis connection error logs should appear.

  CI Prevention:
  - Create a Python validation script at:
      scripts/validate_configmap.py
  - The script must reject manifests containing:
      • carriage return characters
      • non-printable characters
      • escaped CR sequences (\r, \x0d, \u000d)
  - Update the CI workflow to run the validation script against:
      k8s/bleat-service-configmap.yaml

  Constraints:
  - Do not recreate the bleat-service Deployment object.
  - Do not change container image names.
  - Do not use interactive kubectl flags (-it, -i).

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py

timeout_sec: 1800

evaluation:
  type: apex