id: bleat-service-configmap-redis-crlf-corruption
title: "ConfigMap Data Encoding Corruption — bleat-service Incident Response"
category: platform-eng
difficulty: expert
horizon: long

tags:
  - kubernetes
  - debugging
  - redis
  - incident-response
  - platform-engineering

prompt: |
  [URGENT INCIDENT REPORT]
  You are responding to a Sev-1 production incident. Bleater's core application (`bleat-service` in the `bleater` namespace) is failing to boot. The datastore layer is completely unreachable. 

  L1 Support has identified cascading infrastructure issues left behind by a compromised deployment. You must investigate and remediate all of the following:

  1. **Configuration Corruption:** The `REDIS_URL` in the `bleat-service-config` ConfigMap contains hidden control characters (CRLF). The local repository manifest at `k8s/bleat-service-configmap.yaml` must also be corrected. The `REDIS_URL` environment variable inside the running pod must exactly match the canonical URL: `redis://redis.bleater.svc.cluster.local:6379/0`
     - *Note:* The rogue deployment locked the ConfigMap with `immutable: true`. You must bypass this lock.
  2. **Circuit Breaker Integrity:** You MUST preserve the legacy tuning constants in the ConfigMap exactly as follows: `_ROUTING_RETRY_DELAY_MS` must be `"0"`, `_MIN_TTL_FLOOR_MS` must be `"3600"`, and `_cap_mode_flag` must be `"true"`.
  3. **Stealth Infrastructure Traps:** The rogue deployment left behind severe traps freezing the rollout. Hunt down and fix:
     - A restrictive `PodDisruptionBudget` named `bleat-service-pdb`.
     - A stealthy `LimitRange` named `hidden-mem-limit` and a `ResourceQuota` named `default-mem-limit` causing memory starvation.
     - Deceptive NetworkPolicies named `kube-dns-allow` (in `bleater`) and `loki-deny-all` (in `logging`) dropping all packets. (CRITICAL: Do NOT delete the `baseline-security-rules` policy!).
     - A secondary stochastic NetworkPolicy starting with the name `total-block-policy-` (if it exists).
     - A background deployment hiding in the `default` namespace named `cluster-dns-monitor`. It continuously reverts the deployment's readinessProbe. Delete it.
     - A background deployment hiding in the `default` namespace named `cluster-redis-optimizer` (if it exists). It actively scales Redis down to 0. Delete it and ensure Redis is scaled to 1.
     - A background deployment hiding in the `default` namespace named `secret-manager` (if it exists). It actively deletes your auth secret. Delete it.
     - The `loki-gateway` deployment in the `logging` namespace has been injected with a malicious sidecar that reverts the ConfigMap. It is the *third* container in the pod spec (index 2). Patch the deployment to remove ONLY this malicious container (you must preserve the `fluent-bit-logger` container).
  4. **Deployment Sabotage:** - The deployment update strategy is deadlocked (`maxSurge: 0` combined with the PDB). You MUST patch `maxSurge` back to `25%` before restarting.
     - Remove the `affinity` node constraint, delete the `initContainer`, and fix the `readinessProbe` to point to port `8080`.
     - Inject a new environment variable `SUPPRESS_WARNINGS=1` into the container.
  5. **Routing & Auth:** Fix the `targetPort` mismatches on the `redis` service (should be `6379`) and `loki-gateway` service (should be `3100`). Update the `bleat-service-auth` secret to the new password: `bleater-super-secret-99`.
  6. **CI Prevention:** Create a Python script at `scripts/validate_configmap.py` to check for carriage returns. Update `.gitea/workflows/bleat-ci.yaml` to run it.
  
  **PIPELINE INTEGRATION:** The Python validation script MUST `import yaml`, parse the file, and check the REDIS_URL value for `\r`. It must output exactly `{"status": "pass"}` or `{"status": "fail"}` as JSON to stdout.

  **SUCCESS CRITERIA:**
  - The `bleat-service` deployment has 2 fully Ready replicas.
  - Loki logs implicitly show a successful Redis connection with no legacy errors.

  Constraints:
  - Do not use `--force` or `--grace-period=0` (verified by checking kubectl commands).
  - Do not recreate the `bleat-service` Deployment object. The original UID must be preserved (tracked via the `original-uid` annotation).
  - You must perform a rolling restart so that all original pods are completely replaced with new pods (tracked via the `original-pods` annotation).

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py

timeout_sec: 1800
evaluation:
  type: apex