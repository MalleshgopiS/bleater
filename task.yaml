id: bleat-service-configmap-redis-crlf-corruption
title: "Bleat Service Production Incident — Redis Connectivity Failure"
category: platform-eng
difficulty: hard
horizon: long

tags:
  - kubernetes
  - debugging
  - redis
  - platform-engineering
  - configmap
  - loki

prompt: |
  [Context]
  You are responding to a production incident. The `bleat-service` application
  in the `bleater` namespace is currently failing to start.

  Engineers have filed incident reports in the local issue tracker at
  `/home/ubuntu/bleater-app/issues/`. Read them before starting your
  investigation.

  [Task]
  Investigate and remediate the cascading failures preventing `bleat-service`
  from running.

  The system is considered fully restored when:
  1. `bleat-service` is stable, Running, and Ready (2/2 replicas).
  2. The service successfully establishes a Redis connection, verifiable via
     logs in the `logging` namespace (Loki).
  3. Any root-cause automation that causes fixes to revert has been
     permanently removed.
  4. All preventative CI measures requested by the engineering team in the
     issue tracker are implemented and functional.

  Constraints:
  - Do not recreate the `bleat-service` Deployment object; use rolling
    restarts or in-place edits only.
  - Do not change container image names.
  - Do not use interactive kubectl flags (-it, -i).

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py

timeout_sec: 1800
evaluation:
  type: apex
