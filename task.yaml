id: bleat-service-configmap-redis-crlf-corruption
title: Bleat Service Production Incident - Redis Connectivity
category: platform-eng
difficulty: hard
horizon: long

tags:
  - kubernetes
  - debugging
  - redis
  - platform-engineering

prompt: |
  [Context]
  You are responding to a production incident. The `bleat-service` application in the `bleater` namespace is currently failing to start. 
  
  Engineers have reported symptoms in the local incident tracker located at `/root/bleater-app/issues/`.

  [Task]
  Investigate the cascading failures preventing `bleat-service` from connecting to its datastore. 
  
  The system is considered fully restored when:
  1. The `bleat-service` deployment is stable, Running, and Ready.
  2. The service successfully establishes a connection to Redis (verifiable via Loki logs in the `logging` namespace).
  3. All preventative CI measures requested by the engineering team in the issue tracker are implemented and functional.

  Constraints:
  - Do not recreate the bleat-service Deployment object (use rolling restarts/edits).
  - Do not change container image names.
  - Do not use interactive kubectl flags (-it, -i).

setup_script: setup.sh
solution_script: solution.sh
grader_script: grader.py

timeout_sec: 1800
evaluation:
  type: apex